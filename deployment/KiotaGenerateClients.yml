parameters:
  - name: outputDirectory
    type: string
  - name: language
    type: string
    default: 'csharp'
  - name: openApiRepo
    type: string
  - name: openApiBranch
    type: string
    default: 'main'
  - name: openApiSpecPath
    type: string
  - name: GeneratedApiClassName
    type: string
  - name: Namespace
    type: string

steps:
  # - checkout: ${{parameters.openApiRepo}}
  #   path: s/openapi

  - powershell: |
      & "deployment\CheckForKiotaDependency.ps1" -OutputDirectory ${{parameters.outputDirectory}}
    displayName: 'Ensure Kiota is installed'

  - powershell: |
      & "deployment\RunKiota.ps1" `
        -OpenApiSpecPath "deployment\${{ parameters.openApiSpecPath }}" `
        -OutputDirectory "${{parameters.outputDirectory}}" `
        -Language "${{parameters.language}}" `
        -GeneratedApiClassName "${{parameters.GeneratedApiClassName}}" `
        -Namespace "${{parameters.Namespace}}"
    displayName: 'Run Kiota to generate clients'
